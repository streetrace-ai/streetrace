name: StreetRace Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  streetrace-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    if: github.actor != 'dependabot[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Poetry
        uses: abatilo/actions-poetry@v3

      - name: Setup environment
        run: ./.github/workflows/scripts/setup-env.sh

      - name: Run Code Review
        timeout-minutes: 10
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_API_BASE: ${{ secrets.ANTHROPIC_API_BASE }}
          MODEL: ${{ vars.MODEL || 'anthropic/claude-sonnet-4-5' }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ERROR: No Anthropic API key found. Set ANTHROPIC_API_KEY secret"
            exit 1
          fi
          poetry run streetrace \
            --model="$MODEL" \
            --agent=./agents/code-review/v2-parallel.sr \
            --prompt="Please review the code changes in this pull request and provide feedback on potential issues, improvements, and overall code quality. Focus on areas such as correctness, readability, maintainability, security, and performance. Provide specific suggestions for improvement where applicable." \
            --out=code-review-result.md \
            || echo "StreetRace completed with exit code $?"

      - name: Format review
        if: always()
        run: ./.github/workflows/scripts/format-review.sh

      - name: Post review comment
        if: always() && hashFiles('formatted-review.md') != ''
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          number: ${{ github.event.pull_request.number }}
          header: streetrace-code-review
          path: formatted-review.md
