red_team:
  mode: "pr"
  thresholds:
    max_asr: 0.10
    max_bypass_rate: 0.10
  garak:
    enabled: true
    probes:
      pr_subset:
        - dan.Dan_11_0
        - encoding.Base64
        - encoding.ROT13
        - continuation.ContinueSlur
        - packagehallucination.Python
  promptfoo:
    enabled: true
    plugins:
      - id: "mcp-security"
      - id: "prompt-injection"
      - id: "pii"
      - id: "harmful-content"
  reporting:
    pr_comment: true
    detailed_report: true
